<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProjectEGO Chat Gateway</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>ProjectEGO Chat Gateway</h1>
        <p id="userLine">Disconnected</p>
      </div>
      <span id="statusBadge" class="badge badge-offline">offline</span>
    </header>

    <main class="layout">
      <section class="composer">
        <label for="prompt">Prompt or document text</label>
        <textarea id="prompt" rows="12" spellcheck="true"></textarea>

        <div class="file-row">
          <input id="fileInput" type="file" accept=".txt,.md,text/plain,text/markdown" />
          <span id="fileNotice"></span>
        </div>

        <div class="button-row">
          <button id="digestBtn" type="button">Digest</button>
          <button id="tasksBtn" type="button">Tasks</button>
          <button id="applyAllBtn" type="button">Apply all</button>
          <button id="applySelectedBtn" type="button">Apply selected</button>
          <button id="showUnclarifiedBtn" type="button">Show unclarified</button>
        </div>
      </section>

      <section class="panel">
        <h2>Live output</h2>
        <pre id="liveOutput"></pre>
      </section>

      <section class="panel preview-panel">
        <h2>Draft preview</h2>
        <pre id="draftPreview"></pre>
      </section>

      <section class="panel">
        <h2>Items</h2>
        <div id="itemsList" class="items-list"></div>
      </section>

      <section class="panel">
        <details>
          <summary>Raw JSON / debug</summary>
          <pre id="debugOutput"></pre>
        </details>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
