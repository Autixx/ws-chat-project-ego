<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProjectEGO Request/Response Workbench</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="theme-dark">
    <section id="authScreen" class="auth-screen">
      <div class="auth-box">
        <h1>ProjectEGO Login</h1>
        <p id="authMessage"></p>
        <form id="loginForm">
          <input id="loginName" autocomplete="username" placeholder="Username or email" />
          <input id="loginPassword" autocomplete="current-password" type="password" placeholder="Password" />
          <button type="submit">Login</button>
        </form>
        <form id="registerForm" hidden>
          <input id="registerUsername" autocomplete="username" placeholder="Username" />
          <input id="registerEmail" autocomplete="email" placeholder="Email optional" />
          <input id="registerDisplayName" placeholder="Display name optional" />
          <input id="registerPassword" autocomplete="new-password" type="password" placeholder="Password" />
          <input id="registerInviteCode" type="password" placeholder="Invite code" />
          <button type="submit">Register</button>
        </form>
        <button id="toggleAuthMode" type="button">Create account</button>
      </div>
    </section>
    <main id="workbench" class="workbench" hidden>
      <header class="topbar">
        <div class="title-block">
          <h1 id="conversationTitle">PROJECTEGO / CHAT TITLE</h1>
          <div class="status-line"><span id="wsSquare" class="sq red"></span><span>STATUS WS</span><span id="wsText">disconnected</span></div>
          <div class="status-line user-status"><span id="userLine">USER</span> <button id="logoutBtn" type="button">Logout</button></div>
        </div>
        <div class="toolbar">
          <div class="theme-picker" aria-label="Theme">
            <span>Theme</span>
            <button class="theme-swatch light" type="button" data-theme="theme-light" aria-label="Light theme"></button>
            <button class="theme-swatch dark active" type="button" data-theme="theme-dark" aria-label="Dark theme"></button>
            <button class="theme-swatch contrast" type="button" data-theme="theme-contrast" aria-label="Black contrast theme"></button>
          </div>
          <label>Display
            <select id="displayMode">
              <option value="text" selected>Text</option>
              <option value="json">JSON</option>
            </select>
          </label>
          <button id="newConversationBtn" type="button">New</button>
        </div>
        <div class="status-block">
          <div><span id="planeSquare" class="sq gray"></span>STATUS PLANE <span id="planeText">unknown</span></div>
          <div><span id="n8nSquare" class="sq gray"></span>STATUS n8n <span id="n8nText">unknown</span></div>
          <div><span id="dbSquare" class="sq gray"></span>STATUS DB <span id="dbText">unknown</span></div>
        </div>
      </header>

      <section class="conversation-strip">
        <select id="conversationSelect"></select>
        <button id="archiveConversationBtn" type="button">Archive</button>
      </section>

      <section class="search-row">
        <label>REQUEST SEARCH<input id="requestSearch" type="search" placeholder="date, status, mode, text" /></label>
        <label>RESPONSE SEARCH<input id="responseSearch" type="search" placeholder="date, type, project, text" /></label>
      </section>

      <section class="work-grid">
        <section class="panel request-panel">
          <h2>REQUEST WINDOW</h2>
          <div id="requestList" class="row-list"></div>
        </section>

        <section class="panel response-panel">
          <h2>RESPONSE WINDOW</h2>
          <div id="responseList" class="row-list"></div>
        </section>

        <section class="input panel">
          <h2>REQUEST INPUT FIELD</h2>
          <div class="input-grid">
            <textarea id="prompt" rows="4" placeholder="Enter request. Ctrl+Enter sends."></textarea>
            <div class="input-controls">
              <select id="modeSelect">
                <option value="chat">Chat</option>
                <option value="digest">Digest</option>
                <option value="tasks">Tasks</option>
                <option value="abstract_idea">Abstract idea</option>
              </select>
              <div class="request-buttons">
                <label class="icon-button" for="fileInput" aria-label="Attach files" title="Attach files">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8.5 12.5 15 6a3.2 3.2 0 0 1 4.5 4.5l-8.2 8.2a5 5 0 0 1-7.1-7.1l8.4-8.4" />
                    <path d="m10.3 14.3 7-7" />
                  </svg>
                </label>
                <input id="fileInput" class="visually-hidden" type="file" multiple accept=".txt,.md,.mp3,.mp4,text/plain,text/markdown,audio/mpeg,video/mp4" />
                <button id="sendBtn" class="icon-button send-icon" type="button" aria-label="Send request" title="Send request">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 20 21 12 3 4l3.4 7.2L14 12l-7.6.8L3 20Z" />
                  </svg>
                </button>
              </div>
              <span id="fileNotice"></span>
            </div>
          </div>
        </section>

        <section class="attachments panel">
          <h2>ATTACHMENTS WINDOW</h2>
          <div id="attachmentsList" class="attachment-list"></div>
        </section>

        <div class="draft-actions">
          <button id="applySelectedBtn" type="button">Apply selected</button>
          <button id="applyAllBtn" type="button">Apply all</button>
          <button id="keepAllBtn" type="button">Keep all</button>
          <button id="showUnclarifiedBtn" type="button">Show unclarified</button>
        </div>
      </section>

      <section class="draft panel">
        <h2>DRAFT INSPECTOR <span id="draftJobId">No draft</span></h2>
        <pre id="draftPreview"></pre>
        <div id="itemsList" class="items-list"></div>
        <pre id="unclarifiedPanel" class="unclarified"></pre>
      </section>

      <details class="debug">
        <summary>Execution log</summary>
        <pre id="debugOutput"></pre>
      </details>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
