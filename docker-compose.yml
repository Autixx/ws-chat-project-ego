services:
  projectego-chat:
    build:
      context: https://github.com/Autixx/ws-chat-project-ego.git#main
      dockerfile: Dockerfile
    container_name: projectego-chat
    restart: unless-stopped
    user: "568:568"
    ports:
      - "19100:19100"
    image: projectego-ws-chat:local
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 19100
      DATA_DIR: /app/data
      ATTACHMENTS_DIR: /app/data/attachments
      SQLITE_PATH: /app/data/projectego-chat.sqlite
      MAX_UPLOAD_BYTES: "1048576"
      MAX_EXTRACTED_CHARS: "50000"
      MAX_LLM_ATTACHMENT_BYTES: "10485760"
      AGENT_ATTACHMENT_TOKEN: ""
      DASHBOARD_INTERNAL_BASE_URL: ""
      DEV_AUTH_BYPASS: "false"
      TRUST_AUTHELIA_HEADERS: "true"
      AUTH_MODE: local
      SESSION_SECRET: change-me-to-a-long-random-secret
      REGISTRATION_ENABLED: "true"
      REGISTRATION_INVITE_CODE: change-me
      COOKIE_SECURE: "false"
      LLM_PROVIDER: mock
      CODEX_AGENT_URL: "http://192.168.1.237:19090/v1/projectego/process"
      CODEX_AGENT_HEALTH_URL: "http://192.168.1.237:19090/healthz"
      CODEX_AGENT_TOKEN: ""
      CODEX_FALLBACK_TO_MOCK: "true"
      PLANE_BASE_URL: ""
      PLANE_HEALTH_URL: ""
      PLANE_WORKSPACE: projectego
      PLANE_API_KEY: ""
      N8N_BASE_URL: ""
      N8N_HEALTH_URL: ""
      N8N_APPLY_WEBHOOK_URL: ""
      N8N_WEBHOOK_TOKEN: ""
      JOB_CALLBACK_TOKEN: ""
      COMPONENT_STATUS_INTERVAL_MS: "15000"
      COMPONENT_STATUS_TIMEOUT_MS: "2000"
    volumes:
      - projectego-chat-data:/app/data

  projectego-pm:
    build:
      context: https://github.com/Autixx/ws-chat-project-ego.git#main
      dockerfile: Dockerfile
    image: projectego-ws-chat:local
    container_name: projectego-pm
    command: ["node", "dist/pm/server.js"]
    restart: unless-stopped
    user: "568:568"
    ports:
      - "19110:19110"
    environment:
      NODE_ENV: production
      PM_HOST: 0.0.0.0
      PM_PORT: 19110
      PM_DATA_DIR: /app/data
      PM_ATTACHMENTS_DIR: /app/data/attachments
      PM_DATABASE_URL: postgres://projectego_admin:change-me@projectego-postgres:5432/projectego
      PM_AUTO_MIGRATE: "true"
      PM_PUBLIC_BASE_URL: https://pm.project-ego.online
      PM_TRUST_AUTHELIA_HEADERS: "true"
      PM_DEV_AUTH_BYPASS: "false"
      PM_AUTOMATION_TOKEN: ""
      PM_WEBHOOK_URLS: ""
      PM_WEBHOOK_SECRET: ""
      PM_WEBHOOK_TIMEOUT_MS: "5000"
      PM_WEBHOOK_MAX_ATTEMPTS: "6"
      PM_WEBHOOK_RETRY_BASE_MS: "30000"
      PM_WEBHOOK_RETRY_INTERVAL_MS: "15000"
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: pm@project-ego.online
      SMTP_TLS: "true"
    volumes:
      - projectego-pm-data:/app/data
    depends_on:
      - projectego-postgres

  projectego-postgres:
    image: postgres:16-alpine
    container_name: projectego-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectego
      POSTGRES_USER: projectego_admin
      POSTGRES_PASSWORD: change-me
    volumes:
      - projectego-postgres-data:/var/lib/postgresql/data

volumes:
  projectego-chat-data:
  projectego-pm-data:
  projectego-postgres-data:
